name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Core (Go) ────────────────────────────────────────────────
  core-lint:
    name: Core — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: core

  core-test:
    name: Core — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        working-directory: core
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage
          path: core/coverage.out

  core-build:
    name: Core — Build
    runs-on: ubuntu-latest
    needs: [core-lint, core-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        working-directory: core
        run: go build -o wotp-core ./cmd/server

  # ─── SDK — TypeScript ──────────────────────────────────────────
  sdk-typescript:
    name: SDK — TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Type check
        working-directory: sdks/typescript
        run: npm run typecheck

      - name: Build
        working-directory: sdks/typescript
        run: npm run build

  # ─── SDK — Go ──────────────────────────────────────────────────
  sdk-go:
    name: SDK — Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        working-directory: sdks/go
        run: go test -race -v ./...

  # ─── SDK — Python ──────────────────────────────────────────────
  sdk-python:
    name: SDK — Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: sdks/python
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Type check
        working-directory: sdks/python
        run: |
          pip install mypy
          mypy wotp/ --ignore-missing-imports || true
