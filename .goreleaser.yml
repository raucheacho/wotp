version: 2

project_name: wotp-cli



builds:
  - id: cli
    dir: ./cli
    main: ./cmd/wotp
    binary: wotp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew tap publication
brews:
  - repository:
      owner: raucheacho
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/wotp/wotp"
    description: "Self-hosted WhatsApp OTP provider CLI"
    test: |
      system "#{bin}/wotp --help"

# Scoop bucket publication
scoops:
  - repository:
      owner: raucheacho
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/wotp/wotp"
    description: "Self-hosted WhatsApp OTP provider CLI"
