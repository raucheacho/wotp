version: 2

project_name: wotp-cli

builds:
  - id: cli
    dir: ./cli
    main: ./cmd/wotp
    binary: wotp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: raucheacho
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/raucheacho/wotp"
    description: "Self-hosted WhatsApp OTP provider CLI"
    license: "MIT"
    install: |
      bin.install "wotp"
    test: |
      system "#{bin}/wotp", "--help"
    download_strategy: CurlDownloadStrategy

scoops:
  - repository:
      owner: raucheacho
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/raucheacho/wotp"
    description: "Self-hosted WhatsApp OTP provider CLI"
    license: "MIT"

release:
  github:
    owner: raucheacho
    name: wotp
  draft: false
  prerelease: auto
